# Netlify configuration for LuloWinNG Frontend

[build]
  base    = "."
  command = "npm run build"
  publish = "dist"

# Proxy /api → backend en Railway (debe ir ANTES del SPA redirect)
[[redirects]]
  from   = "/api/*"
  to     = "https://lulo-backend-netlifly-production.up.railway.app/api/:splat"
  status = 200
  force  = true

# Proxy /uploads → backend en Railway
[[redirects]]
  from   = "/uploads/*"
  to     = "https://lulo-backend-netlifly-production.up.railway.app/uploads/:splat"
  status = 200
  force  = true

# SPA redirect: todas las rutas → index.html (debe ir AL FINAL)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
